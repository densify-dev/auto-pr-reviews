name: Release Bitbucket Pipe

on:
  push:
    tags:
      - 'pipe-v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#pipe-v}"
          major="${version%%.*}"
          minor="${version%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Build and push pipe image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auto-pr-reviews-bitbucket-pipe:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/auto-pr-reviews-bitbucket-pipe:${{ steps.meta.outputs.major }}
            ghcr.io/${{ github.repository_owner }}/auto-pr-reviews-bitbucket-pipe:${{ steps.meta.outputs.minor }}
