name: Central PR Review

on:
  repository_dispatch:
    types: [pr-review-request]
  workflow_dispatch:
    inputs:
      provider:
        description: Pull request provider
        required: true
        type: choice
        options:
          - github
          - bitbucket
      repo:
        description: Repository in owner/name format
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: central-pr-review-${{ github.event.client_payload.provider || inputs.provider }}-${{ github.event.client_payload.repo || inputs.repo }}-${{ github.event.client_payload.pr_number || inputs.pr_number }}
      cancel-in-progress: true
    env:
      PROVIDER: ${{ github.event.client_payload.provider || inputs.provider }}
      REPO: ${{ github.event.client_payload.repo || inputs.repo }}
      PR_NUMBER: ${{ github.event.client_payload.pr_number || inputs.pr_number }}
      ALLOWED_GITHUB_OWNER: ${{ vars.ALLOWED_GITHUB_OWNER || vars.ALLOWED_REPO_OWNER }}
      ALLOWED_BITBUCKET_WORKSPACE: ${{ vars.ALLOWED_BITBUCKET_WORKSPACE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Validate request
        id: target-repo
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${PROVIDER:-}" ]]; then
            echo "PROVIDER must be set to github or bitbucket" >&2
            exit 1
          fi

          if [[ "$PROVIDER" != "github" && "$PROVIDER" != "bitbucket" ]]; then
            echo "Unsupported provider: $PROVIDER" >&2
            exit 1
          fi

          owner="${REPO%%/*}"
          repo="${REPO#*/}"

          if [[ -z "$owner" || -z "$repo" || "$owner" == "$repo" ]]; then
            echo "Expected REPO in owner/name format, got: $REPO" >&2
            exit 1
          fi

          if [[ ! "$owner" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,38}$ || ! "$repo" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Repository contains invalid characters: $REPO" >&2
            exit 1
          fi

          if [[ "$PROVIDER" == "github" ]]; then
            if [[ -z "${ALLOWED_GITHUB_OWNER:-}" ]]; then
              echo "ALLOWED_GITHUB_OWNER repository variable must be configured" >&2
              exit 1
            fi

            if [[ "$owner" != "$ALLOWED_GITHUB_OWNER" ]]; then
              echo "GitHub repository owner $owner is not allowed" >&2
              exit 1
            fi
          else
            if [[ -z "${ALLOWED_BITBUCKET_WORKSPACE:-}" ]]; then
              echo "ALLOWED_BITBUCKET_WORKSPACE repository variable must be configured" >&2
              exit 1
            fi

            if [[ "$owner" != "$ALLOWED_BITBUCKET_WORKSPACE" ]]; then
              echo "Bitbucket workspace $owner is not allowed" >&2
              exit 1
            fi
          fi

          if [[ ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "PR_NUMBER must be a positive integer, got: $PR_NUMBER" >&2
            exit 1
          fi

          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        if: steps.target-repo.outputs.provider == 'github'
        shell: bash
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          TARGET_OWNER: ${{ steps.target-repo.outputs.owner }}
          TARGET_REPO: ${{ steps.target-repo.outputs.repo }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_APP_ID:-}" || -z "${GH_APP_PRIVATE_KEY:-}" ]]; then
            echo "GH_APP_ID variable and GH_APP_PRIVATE_KEY secret must be configured" >&2
            exit 1
          fi

          make_request() {
            local method="$1"
            local url="$2"
            local auth_token="$3"
            local body="${4:-}"
            local response_file
            response_file=$(mktemp)

            local http_code
            if [[ -n "$body" ]]; then
              http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $auth_token" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$url" \
                -d "$body")
            else
              http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -X "$method" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $auth_token" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$url")
            fi

            if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
              echo "GitHub API request failed: $method $url (HTTP $http_code)" >&2
              cat "$response_file" >&2
              rm -f "$response_file"
              return 1
            fi

            cat "$response_file"
            rm -f "$response_file"
          }

          app_jwt=$(node <<'NODE'
          const crypto = require('crypto');

          const appId = process.env.GH_APP_ID;
          const privateKey = process.env.GH_APP_PRIVATE_KEY.replace(/\\n/g, '\n');
          const now = Math.floor(Date.now() / 1000);

          const encode = (value) => Buffer.from(JSON.stringify(value)).toString('base64url');
          const header = encode({ alg: 'RS256', typ: 'JWT' });
          const payload = encode({ iat: now - 60, exp: now + 540, iss: appId });

          const signer = crypto.createSign('RSA-SHA256');
          signer.update(`${header}.${payload}`);
          signer.end();

          process.stdout.write(`${header}.${payload}.${signer.sign(privateKey).toString('base64url')}`);
          NODE
          )

          installation_id=""
          for path in \
            "$GITHUB_API_URL/repos/$TARGET_OWNER/$TARGET_REPO/installation" \
            "$GITHUB_API_URL/orgs/$TARGET_OWNER/installation" \
            "$GITHUB_API_URL/users/$TARGET_OWNER/installation"
          do
            if response=$(make_request GET "$path" "$app_jwt" 2>/dev/null); then
              installation_id=$(printf '%s' "$response" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => process.stdout.write(String(JSON.parse(data).id || '')));")
              break
            fi
          done

          if [[ -z "$installation_id" ]]; then
            echo "Unable to find a GitHub App installation for $TARGET_OWNER/$TARGET_REPO. Install the app on the owner or repository." >&2
            exit 1
          fi

          token_response=$(make_request POST "$GITHUB_API_URL/app/installations/$installation_id/access_tokens" "$app_jwt")
          installation_token=$(printf '%s' "$token_response" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).token));")

          if [[ -z "$installation_token" ]]; then
            echo "Failed to create an installation access token for installation $installation_id" >&2
            exit 1
          fi

          if ! make_request GET "$GITHUB_API_URL/repos/$TARGET_OWNER/$TARGET_REPO" "$installation_token" >/dev/null 2>&1; then
            echo "Created an installation token, but the app still cannot access $TARGET_OWNER/$TARGET_REPO. Ensure the installation includes that repository." >&2
            exit 1
          fi

          echo "token=$installation_token" >> "$GITHUB_OUTPUT"

      - name: Run review
        working-directory: ${{ github.workspace }}
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          GH_MCP_TOKEN: ${{ steps.app-token.outputs.token }}
          BB_MCP_TOKEN: ${{ secrets.BB_MCP_TOKEN }}
        run: |
          set -euo pipefail

          agent=""
          review_target=""

          if [[ "$PROVIDER" == "github" ]]; then
            agent="github-pr-review"
            review_target="https://github.com/$REPO/pull/$PR_NUMBER"
          else
            if [[ -z "${BB_MCP_TOKEN:-}" ]]; then
              echo "BB_MCP_TOKEN secret must be configured for Bitbucket reviews" >&2
              exit 1
            fi

            agent="bitbucket-pr-review"
            review_target="https://bitbucket.org/$REPO/pull-requests/$PR_NUMBER"
          fi

          opencode run "Review $review_target" --agent "$agent"
