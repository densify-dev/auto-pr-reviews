name: Auto PR Reviews Bitbucket Pipe
image: ghcr.io/densify-dev/auto-pr-reviews-bitbucket-pipe
description: Run automated PR reviews on Bitbucket pull requests using opencode.
category: Utility
variables:
  - name: BB_MCP_TOKEN
    required: true
  - name: PR_REVIEW_BITBUCKET_PR_READ_TOKEN
    required: true
  - name: AWS_BEARER_TOKEN_BEDROCK
    required: true
    description: "Token for Amazon Bedrock to run Claude Sonnet 4.6"
  - name: DEBUG
    default: "false"
  - name: OPENCODE_TIMEOUT
    description: "Timeout in seconds for the opencode review process (default: 600)"


